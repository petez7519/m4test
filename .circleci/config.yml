version: 2.1

# 🔧 Top-Level Parameters
parameters:
  xcode_version:
    type: string
    default: "15.3.0"
  app_scheme:
    type: string
    default: "MyApp"
  artifact_path:
    type: string
    default: "build/MyApp.ipa"

# 🧱 Executors
executors:
  mac_build:
    macos:
      xcode: << parameters.xcode_version >>
    working_directory: ~/project

  signing_node:
    docker:
      - image: cimg/base:stable
    resource_class: medium
    working_directory: ~/signing

# 🛠 Jobs
jobs:
  build_app:
    parameters:
      app_scheme:
        type: string
      artifact_path:
        type: string
    executor: mac_build
    steps:
      - checkout
      - run:
          name: Build .ipa
          command: |
            xcodebuild -scheme << parameters.app_scheme >> -configuration Release -archivePath build/MyApp.xcarchive archive
            xcodebuild -exportArchive -archivePath build/MyApp.xcarchive -exportPath build -exportOptionsPlist ExportOptions.plist
      - persist_to_workspace:
          root: build
          paths:
            - MyApp.ipa

  sign_artifact:
    parameters:
      artifact_path:
        type: string
    executor: signing_node
    steps:
      - attach_workspace:
          at: ~/signing
      - run:
          name: Sign .ipa
          command: |
            ./scripts/sign.sh << parameters.artifact_path >>
      - store_artifacts:
          path: ~/signing/MyApp-signed.ipa
          destination: signed/MyApp.ipa

# 🔁 Workflow
workflows:
  version: 2
  build_and_sign:
    jobs:
      - build_app:
          app_scheme: << pipeline.parameters.app_scheme >>
          artifact_path: << pipeline.parameters.artifact_path >>
      - sign_artifact:
          requires:
            - build_app
          artifact_path: << pipeline.parameters.artifact_path >>
