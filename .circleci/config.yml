version: 2.1
jobs:
  hello-world:
    macos:
      xcode: 16.4.0
    resource_class: m4pro.medium
    steps:
      - run:
          name: Print Hello World
          command: echo "Hello World"
      - run:
          name: Check Xcode Version
          command: |
            echo "=== Xcode Version ==="
            xcodebuild -version
            echo ""
            echo "=== Available Xcode Installations ==="
            ls -la /Applications/ | grep Xcode
      - run:
          name: Install CMake via Homebrew
          command: |
            echo "=== Installing CMake ==="
            if command -v brew &> /dev/null; then
                echo "✅ Homebrew is available"
                echo "Installing CMake..."
                brew install cmake
                echo "✅ CMake installation completed"
            else
                echo "❌ Homebrew not found - installing Homebrew first"
                /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
                echo "✅ Homebrew installed, now installing CMake..."
                brew install cmake
                echo "✅ CMake installation completed"
      - run:
          name: Check CMake Installation
          command: |
            echo "=== CMake Check ==="
            if command -v cmake &> /dev/null; then
                echo "✅ CMake is installed"
                cmake --version
                echo ""
                echo "CMake installation path:"
                which cmake
                echo ""
                echo "CMake configuration info:"
                cmake --help | head -20
            else
                echo "❌ CMake is not installed"
                echo ""
                echo "Available package managers for installing CMake:"
                if command -v brew &> /dev/null; then
                    echo "✅ Homebrew is available - you can install with: brew install cmake"
                else
                    echo "❌ Homebrew not found"
                fi
                
                if command -v port &> /dev/null; then
                    echo "✅ MacPorts is available - you can install with: sudo port install cmake"
                else
                    echo "❌ MacPorts not found"
                fi
                
                echo ""
                echo "You can also download CMake from: https://cmake.org/download/"
                exit 1
            fi
      - run:
          name: Show System Information (About This Mac)
          command: |
            echo "=== System Information ==="
            system_profiler SPSoftwareDataType SPHardwareDataType
workflows:
  main:
    jobs:
      - hello-world
