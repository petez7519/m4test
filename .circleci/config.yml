version: 2.1

# 🔧 Pipeline Parameters
parameters:
  xcode_version:
    type: string
    default: "15.3.0"
  app_scheme:
    type: string
    default: "MyApp"
  artifact_name:
    type: string
    default: "MyApp.ipa"

# 🧱 Executors
executors:
  mac_build:
    macos:
      xcode: "15.3.0"  # Static default; dynamic version passed via env
    working_directory: ~/project

  signing_node:
    docker:
      - image: cimg/base:stable
    resource_class: medium
    working_directory: ~/signing

# 🛠 Commands
commands:
  build_ipa:
    parameters:
      app_scheme:
        type: string
      artifact_name:
        type: string
      xcode_version:
        type: string
    steps:
      - run:
          name: Build .ipa
          command: |
            echo "Using Xcode version: << parameters.xcode_version >>"
            xcodebuild -scheme << parameters.app_scheme >> -configuration Release -archivePath build/<< parameters.app_scheme >
